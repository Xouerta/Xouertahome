<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xouerta · 前端法师学徒</title>
    <style>
        /* ===== 全局重置与字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;600&display=swap');

        body {
            font-family: 'Crimson Text', serif;
            background-color: #1a0f0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 魔法粒子画布 ===== */
        #magic-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== 主卷轴容器 ===== */
        .scroll-container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            background: #d9c8a9;
            background-image:
                    radial-gradient(circle at 30% 40%, rgba(255, 240, 200, 0.4) 0%, transparent 30%),
                    repeating-linear-gradient(45deg, rgba(180, 140, 100, 0.1) 0px, rgba(180, 140, 100, 0.1) 2px,
                    rgba(140, 100, 70, 0.1) 2px, rgba(140, 100, 70, 0.1) 6px);
            box-shadow:
                    0 20px 40px rgba(0, 0, 0, 0.6),
                    0 0 0 2px #b89a7a inset,
                    0 0 0 4px #7a5a3a inset;
            border-radius: 20px 20px 12px 12px;
            padding: 40px 30px;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .scroll-container:hover {
            box-shadow:
                    0 25px 50px rgba(0, 0, 0, 0.8),
                    0 0 0 2px #e4c086 inset,
                    0 0 0 4px #a67c4a inset,
                    0 0 30px #ffd70033;
        }

        /* 卷轴轴装饰 */
        .scroll-container::before,
        .scroll-container::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30px;
            background: linear-gradient(to right, #b48c5c, #d9b382, #b48c5c);
            border-radius: 20px;
            box-shadow: 0 0 15px #4a2e1a;
        }

        .scroll-container::before {
            left: -10px;
            transform: skewY(-3deg);
        }

        .scroll-container::after {
            right: -10px;
            transform: skewY(3deg);
        }

        /* ===== 标题区域 ===== */
        .hero-section {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .hero-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 3.5rem;
            color: #3a281a;
            text-shadow:
                    2px 2px 0 #b68b5c,
                    4px 4px 0 #5a3e2a,
                    0 0 15px #ffae00;
            letter-spacing: 4px;
            margin-bottom: 10px;
            transform-style: preserve-3d;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 2px 2px 0 #b68b5c, 4px 4px 0 #5a3e2a, 0 0 15px #ffae00; }
            100% { text-shadow: 2px 2px 0 #dbb06c, 6px 6px 0 #7a522a, 0 0 30px #ffcc66, 0 0 60px #ffaa33; }
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: #4a3222;
            font-style: italic;
            border-top: 1px solid #b5946a;
            border-bottom: 1px solid #b5946a;
            padding: 10px 0;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        /* ===== 冒险者画像 ===== */
        .profile-section {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
            align-items: center;
        }

        .profile-avatar {
            flex: 0 0 200px;
            height: 200px;
            border-radius: 50%;
            background: #8b6f4c;
            background-image:
                    radial-gradient(circle at 30% 30%, #c9a87c, #6b4f2e),
                    repeating-linear-gradient(45deg, #aa8b5c22 0px, #aa8b5c22 5px, #7a5a3a22 5px, #7a5a3a22 10px);
            border: 5px solid #c9a87c;
            box-shadow: 0 10px 25px #2a1a0a, 0 0 0 2px #dbb06c inset;
            position: relative;
            overflow: hidden;
            animation: avatarFloat 6s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #ffd9a3;
            text-shadow: 3px 3px 0 #5a3a1a;
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .profile-intro {
            flex: 1;
            background: rgba(250, 235, 200, 0.5);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 30px 10px 30px 10px;
            border: 2px solid #c9a042;
            box-shadow: 5px 5px 0 #6b4f2a;
            position: relative;
        }

        .profile-intro::before {
            content: '❧';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 2rem;
            color: #c9a042;
            text-shadow: 2px 2px 0 #5a3a1a;
            transform: rotate(15deg);
        }

        /* 打字机效果 */
        .typed-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #2a1e12;
            min-height: 150px;
        }

        .typed-text span {
            color: #8a4e1f;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: 'MedievalSharp', cursive;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            margin-left: 2px;
            background: #5a3a1a;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ===== 技能面板 ===== */
        .skills-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .skill-card {
            background: #b28b5c;
            background: linear-gradient(145deg, #c9a87c, #9f7e54);
            border: 3px solid #eec27e;
            border-radius: 20px 5px 20px 5px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 4px 4px 0 #4a3222, 0 0 20px #ffd27f33;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 8px 8px 0 #3a2a1a, 0 0 30px #ffcc66;
            border-color: #ffdb9d;
        }

        .skill-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #ffffff66 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .skill-card:hover::after {
            opacity: 1;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .skill-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(2px 4px 4px #2a1a0a);
        }

        .skill-name {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            color: #2a1e0a;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .skill-level {
            font-size: 1rem;
            color: #f5e6d3;
            background: #5a3e2a;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            margin-top: 8px;
            font-family: 'Fira Code', monospace;
        }

        /* ===== 魔法符文菜单 ===== */
        .rune-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 40px 0 20px;
            padding: 20px 0;
            border-top: 2px dashed #b5946a;
            border-bottom: 2px dashed #b5946a;
        }

        .rune-item {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.2rem;
            padding: 10px 25px;
            background: #7a5a3a;
            color: #f0e0b0;
            border: 2px solid #dbb06c;
            border-radius: 30px 5px 30px 5px;
            box-shadow: 3px 3px 0 #3a2a1a;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .rune-item:hover {
            background: #9f7e54;
            color: #fff2d7;
            transform: scale(1.1) rotate(-1deg);
            box-shadow: 5px 5px 0 #2a1a0a, 0 0 25px #ffaa33;
            border-color: #ffdb9d;
        }

        .rune-item::before {
            content: '⚡';
            position: absolute;
            left: -15px;
            top: -5px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.2s, left 0.2s;
        }

        .rune-item:hover::before {
            opacity: 1;
            left: -5px;
        }

        /* 当前页面的高亮 */
        .rune-item.active {
            background: #9f7e54;
            color: #fff2d7;
            box-shadow: 5px 5px 0 #2a1a0a, 0 0 25px #ffaa33;
            border-color: #ffdb9d;
        }

        .rune-item.active::before {
            content: '✦';
            opacity: 1;
            left: -5px;
        }

        /* ===== 魔法信标 ===== */
        .beacon-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 10px;
        }

        .beacon {
            width: 12px;
            height: 12px;
            background: #8a6a3a;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffbb33;
            animation: beaconPulse 2s infinite;
        }

        .beacon:nth-child(2) { animation-delay: 0.5s; }
        .beacon:nth-child(3) { animation-delay: 1s; }
        .beacon:nth-child(4) { animation-delay: 1.5s; }

        @keyframes beaconPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); box-shadow: 0 0 10px #ffbb33; }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 30px #ffaa33, 0 0 60px #ff8833; }
        }

        /* ===== 签名 ===== */
        .signature {
            text-align: right;
            margin-top: 30px;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            color: #5a3e22;
            text-shadow: 1px 1px 0 #c9a87c;
            border-top: 1px solid #b5946a;
            padding-top: 20px;
        }

        .signature span {
            font-size: 2rem;
            animation: spin 10s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== 响应式调整 ===== */
        @media (max-width: 768px) {
            .scroll-container {
                padding: 30px 15px;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .profile-section {
                flex-direction: column;
                align-items: center;
            }

            .profile-avatar {
                flex: 0 0 150px;
                width: 150px;
                height: 150px;
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
<!-- 魔法粒子画布 -->
<canvas id="magic-particles"></canvas>

<!-- 主卷轴内容 -->
<main class="scroll-container">

    <div class="skills-section">

        <div class="skill-card">

        <div class="skill-card">

    </div>

    <!-- 魔法符文菜单（导航到各个页面） -->
    <nav class="rune-menu">
        <a href="index.html" class="rune-item active">🏠 旅者大厅·稍作休息</a>

    <!-- 动态魔法信标 -->

    <!-- 签名 -->

<script>
    // ===== 魔法粒子效果 =====
    (function() {
        const canvas = document.getElementById('magic-particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // 创建粒子
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 4 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    color: `rgba(${200 + Math.random() * 55}, ${150 + Math.random() * 105}, 50, ${Math.random() * 0.5 + 0.2})`
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#ffaa33';
                ctx.shadowBlur = 15;
                ctx.fill();

                // 移动粒子
                p.x += p.speedX;
                p.y += p.speedY;

                // 边界回弹
                if (p.x < 0 || p.x > width) p.speedX *= -1;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
            });

            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', () => {
            initCanvas();
        });

        initCanvas();
        drawParticles();
    })();

    // ===== 打字机效果（前端法师版） =====
    (function() {
        const typedTextElement = document.getElementById('typed-text');
        const textLines = [
            '<span>⚛ 欢迎！</span><br>',
            '你好啊，欢迎来到Xouerta的画中世界！<br><br>',
            '<span>▲ 关于我：</span><br>',
            '我是一位web前端开发者，目前正在努力练习提升技能。<br><br>',
            '<span>📜 我是什么样的</span><br>',
            '编码焦虑（担心编译出错），AI编程受益者（开玩笑的搞半天还得自己拼）<br><br>',
            '<span>✨ 如今</span><br>',
            '我游历于各个前端框架之间，收集最佳实践，让自己的知识面更为充盈。'
        ];

        let lineIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let currentHTML = '';

        function typeEffect() {
            if (lineIndex < textLines.length) {
                const currentLine = textLines[lineIndex];

                if (!isDeleting) {
                    // 打字
                    currentHTML = currentLine.substring(0, charIndex + 1);
                    typedTextElement.innerHTML = currentHTML + '<span class="cursor">|</span>';
                    charIndex++;

                    if (charIndex === currentLine.length) {
                        isDeleting = true;
                        setTimeout(typeEffect, 800); // 行末暂停
                        return;
                    }
                } else {
                    // 删除（可选）
                    isDeleting = false;
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeEffect, 400);
                    return;
                }
            } else {
                // 全部打完，光标继续闪烁
                typedTextElement.innerHTML = textLines.join('') + '<span class="cursor">|</span>';
                return;
            }

            const speed = isDeleting ? 30 : 80;
            setTimeout(typeEffect, speed);
        }

        // 页面加载后开始打字效果
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 500);
        });
    })();

    // ===== 技能卡片的涟漪效果 =====
    document.querySelectorAll('.skill-card').forEach(card => {
        card.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.backgroundColor = '#ffffff88';
            ripple.style.pointerEvents = 'none';
            ripple.style.left = e.offsetX + 'px';
            ripple.style.top = e.offsetY + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.transform = 'translate(-50%, -50%) scale(0)';
            ripple.style.animation = 'ripple 0.6s ease-out forwards';
            ripple.style.zIndex = '100';

            // 添加动画关键帧
            const style = document.createElement('style');
            style.textContent = `
                    @keyframes ripple {
                        to { transform: translate(-50%, -50%) scale(20); opacity: 0; }
                    }
                `;
            document.head.appendChild(style);

            this.style.position = 'relative';
            this.appendChild(ripple);

            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>
