<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识卷轴 · 艾德温的藏书阁</title>
    <style>
        /* ===== 复用之前的西幻风格 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap');

        body {
            font-family: 'Crimson Text', serif;
            background-color: #1a0f0a;
            background-image: radial-gradient(circle at 10% 20%, #3a281a33 0%, transparent 30%),
            radial-gradient(circle at 90% 80%, #5a3e2a33 0%, transparent 40%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 魔法粒子画布 */
        #magic-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 主容器 */
        .library-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            background: #d4ba93;
            background-image:
                    linear-gradient(165deg, #d0b48a 0%, #e8d0b0 40%, #cfb58b 100%),
                    repeating-linear-gradient(45deg, rgba(150, 110, 70, 0.1) 0px, rgba(150, 110, 70, 0.1) 2px,
                    rgba(120, 80, 50, 0.1) 2px, rgba(120, 80, 50, 0.1) 6px);
            background-blend-mode: overlay;
            box-shadow: 0 30px 50px #00000080, 0 0 0 2px #b89a7a inset, 0 0 0 6px #7a5a3a inset;
            border-radius: 30px 30px 15px 15px;
            padding: 30px;
        }

        /* 页眉 */
        .library-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px double #aa7e5a;
            padding-bottom: 20px;
            position: relative;
        }

        .library-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 3.8rem;
            color: #3a281a;
            text-shadow:
                    3px 3px 0 #b48654,
                    6px 6px 0 #5a3e2a,
                    0 0 20px #ffbf40;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .library-subtitle {
            font-size: 1.3rem;
            color: #5a3e2a;
            font-style: italic;
            background: #f0dbb0aa;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 50px;
            backdrop-filter: blur(3px);
            box-shadow: 0 4px 0 #8b6f4c;
        }

        .breadcrumb {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 10px;
            color: #6b4f2a;
            font-size: 1.1rem;
        }

        .breadcrumb a {
            color: #8b5a2e;
            text-decoration: none;
            border-bottom: 1px dashed #b48654;
        }

        .breadcrumb a:hover {
            color: #c68642;
            border-bottom: 1px solid #e5a55c;
        }

        /* 分类标签 */
        .magic-schools {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }

        .school-tag {
            font-family: 'MedievalSharp', cursive;
            padding: 8px 25px;
            background: #7a5a3a;
            color: #f0dbb0;
            border: 2px solid #dbb06c;
            border-radius: 30px 5px 30px 5px;
            box-shadow: 3px 3px 0 #3a2a1a;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .school-tag:hover,
        .school-tag.active {
            background: #9f7e54;
            color: #fff2d7;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 5px 5px 0 #2a1a0a, 0 0 20px #ffaa33;
            border-color: #ffdb9d;
        }

        .school-tag.active::before {
            content: '⚡';
            margin-right: 5px;
        }

        /* 文章列表区域 */
        .posts-container {
            margin: 30px 0;
        }

        /* 加载状态 */
        .loading-spell {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: #5a3e2a;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 5px #ffaa33; }
            50% { opacity: 1; text-shadow: 0 0 20px #ffaa33, 0 0 40px #ff8833; }
        }

        /* 文章网格 */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .post-card {
            background: #efddc1;
            background: linear-gradient(145deg, #f5e5ce, #e5cfaf);
            border: 3px solid #cfa86a;
            border-radius: 20px 5px 20px 5px;
            padding: 20px;
            box-shadow: 6px 6px 0 #6b4f2a, 0 0 0 1px #ffdd99 inset;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #c9a042, #e5b56b, #c9a042);
        }

        .post-card:hover {
            transform: translateY(-8px) rotate(0.5deg);
            box-shadow: 10px 10px 0 #4a3222, 0 0 30px #ffcc80;
            border-color: #f5c27b;
        }

        .post-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #8b5a2e;
        }

        .post-category {
            background: #b48654;
            color: #faf0d7;
            padding: 3px 12px;
            border-radius: 30px;
            font-family: 'Special Elite', cursive;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .post-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-date::before {
            content: '📅';
        }

        .post-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            color: #3a281a;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .post-excerpt {
            color: #4a3a2a;
            line-height: 1.6;
            margin-bottom: 15px;
            font-style: italic;
        }

        .post-level {
            display: inline-block;
            background: #7a5a3a;
            color: #f0dbb0;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .continue-link {
            display: inline-block;
            margin-top: 15px;
            color: #8b5a2e;
            font-family: 'MedievalSharp', cursive;
            text-decoration: none;
            border-bottom: 2px dotted #b48654;
            transition: all 0.2s;
        }

        .continue-link:hover {
            color: #d48d4a;
            border-bottom: 2px solid #d48d4a;
            transform: translateX(5px);
        }

        .continue-link::after {
            content: ' →';
            font-size: 1.2rem;
        }

        /* 空状态 */
        .no-posts {
            text-align: center;
            padding: 60px;
            color: #5a3e2a;
            font-size: 1.3rem;
            font-style: italic;
        }

        /* 页脚 */
        .library-footer {
            margin-top: 40px;
            text-align: center;
            color: #5a3e2a;
        }

        .rune-divider {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            font-size: 1.5rem;
            color: #b48654;
        }
    </style>
</head>
<body>
<canvas id="magic-particles"></canvas>

<div class="library-container">
    <header class="library-header">
        <h1 class="library-title">📜 知识卷轴</h1>
        <div class="library-subtitle">艾德温的异世界藏书阁 · 第八纪</div>
        <div class="breadcrumb">
            <a href="../index.html">🏠 旅者大厅</a> ✦
            <span>📖 知识卷轴</span>
        </div>
    </header>

    <!-- 分类筛选 -->
    <div class="magic-schools" id="category-filters">
        <span class="school-tag active" data-category="all">全部卷轴</span>
        <!-- 分类会通过 JavaScript 动态生成 -->
    </div>

    <!-- 文章列表容器 -->
    <div class="posts-container" id="posts-container">
        <div class="loading-spell">✨ 正在召唤卷轴 ...</div>
    </div>

    <footer class="library-footer">
        <div class="rune-divider">
            <span>✧</span> <span>⚡</span> <span>✧</span> <span>⚡</span> <span>✧</span>
        </div>
        <p>© 第八纪 · 知识卷轴由艾德温·影歌编纂</p>
    </footer>
</div>

<script>
    // ===== 魔法粒子效果 =====
    (function initParticles() {
        const canvas = document.getElementById('magic-particles');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    color: `rgba(${200 + Math.random() * 55}, ${150 + Math.random() * 105}, 50, ${Math.random() * 0.3 + 0.1})`
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#ffaa33';
                ctx.shadowBlur = 10;
                ctx.fill();

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > width) p.speedX *= -1;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    })();

    // ===== 文章数据管理 =====
    // 这里定义文章列表（在实际使用中，可以从外部 JSON 文件加载）
    const postsData = [
        {
            file: 'first-adventure.md',
            title: '迷雾森林的初次冒险',
            excerpt: '作为一名初出茅庐的冒险者，我在迷雾森林遇到了会说话的狐狸和发光的蘑菇...',
            category: '游记',
            date: '迷雾纪 34年 星辉月',
            level: '入门',
            order: 1
        },
        {
            file: 'dragon-lore.md',
            title: '上古巨龙的元素低语',
            excerpt: '在风暴峭壁之巅，我与一头古老的巨龙交谈。它告诉我，元素不是被驾驭的，而是被理解的。',
            category: '元素魔法',
            date: '迷雾纪 34年 霜降月',
            level: '大师级',
            order: 2
        },
        {
            file: 'magic-theory.md',
            title: '魔法三定律：从入门到放弃',
            excerpt: '每个法师都必须知道的三大定律，以及为什么我建议你准备好足够的耐心再开始...',
            category: '理论',
            date: '迷雾纪 33年 暗影月',
            level: '进阶',
            order: 3
        },
        {
            file: 'alchemy-101.md',
            title: '炼金术士的锅：常见失误大全',
            excerpt: '我炸掉过七个坩埚后，总结出了这份炼金避坑指南。',
            category: '炼金术',
            date: '迷雾纪 33年 黎明月',
            level: '入门',
            order: 4
        },
        {
            file: 'rune-decoding.md',
            title: '矮人符文解读：地下城的秘密',
            excerpt: '在卡兹莫丹的地下遗迹中，我发现了一套从未被记载的古代符文系统...',
            category: '古代符文',
            date: '迷雾纪 32年 星辉月',
            level: '大师级',
            order: 5
        },
        {
            file: 'necromancy-ethics.md',
            title: '骸骨低语者：死灵法术中的生命伦理',
            excerpt: '死灵法术并非只有黑暗。在古老墓穴中，我学会了如何让逝者的记忆以另一种方式延续...',
            category: '死灵学派',
            date: '迷雾纪 32年 迷雾月',
            level: '进阶',
            order: 6
        }
    ];

    // 按日期排序（最新的在前面）
    postsData.sort((a, b) => b.order - a.order);

    // ===== 渲染文章列表 =====
    function renderPosts(filterCategory = 'all') {
        const container = document.getElementById('posts-container');

        // 根据分类筛选文章
        const filteredPosts = filterCategory === 'all'
            ? postsData
            : postsData.filter(post => post.category === filterCategory);

        if (filteredPosts.length === 0) {
            container.innerHTML = '<div class="no-posts">📭 这个学派的卷轴还在撰写中...</div>';
            return;
        }

        // 生成 HTML
        let html = '<div class="posts-grid">';

        filteredPosts.forEach(post => {
            html += `
                    <article class="post-card">
                        <div class="post-meta">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">${post.date}</span>
                        </div>
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <span class="post-level">🔮 ${post.level}</span>
                        <div>
                            <a href="read.html?post=${post.file}" class="continue-link">阅读卷轴</a>
                        </div>
                    </article>
                `;
        });

        html += '</div>';

        // 模拟加载延迟，让效果更自然
        setTimeout(() => {
            container.innerHTML = html;
        }, 800);
    }

    // ===== 生成分类标签 =====
    function renderCategories() {
        const filterContainer = document.getElementById('category-filters');

        // 提取所有不重复的分类
        const categories = ['all', ...new Set(postsData.map(post => post.category))];

        // 清空容器（保留第一个"全部卷轴"）
        filterContainer.innerHTML = '';

        // 重新生成标签
        categories.forEach(cat => {
            const tag = document.createElement('span');
            tag.className = 'school-tag' + (cat === 'all' ? ' active' : '');
            tag.dataset.category = cat;
            tag.textContent = cat === 'all' ? '全部卷轴' : cat;

            tag.addEventListener('click', function() {
                // 更新激活状态
                document.querySelectorAll('.school-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                // 重新渲染文章
                renderPosts(this.dataset.category);
            });

            filterContainer.appendChild(tag);
        });
    }

    // ===== 初始化 =====
    window.addEventListener('load', () => {
        renderCategories();
        renderPosts('all');
    });
</script>
</body>
</html>
