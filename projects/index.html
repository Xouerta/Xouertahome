<!DOCTYPE html>
<html lang="zh">
<head>

    <style>
        /* ===== 基础风格 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap');

            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 魔法粒子画布 */
        #magic-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== 主容器 ===== */
        .workshop-container {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            margin: 0 auto;
            background: #2a1e12;
            background-image:
                    radial-gradient(circle at 20% 30%, #5a3e2a33 0%, transparent 50%),
                    repeating-linear-gradient(45deg, #3a2a1a22 0px, #3a2a1a22 4px, #2a1e1222 4px, #2a1e1222 8px);
            box-shadow: 0 30px 60px #000000cc, 0 0 0 3px #b48654 inset, 0 0 0 8px #4a3222 inset;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            border: 1px solid #cfa86a;
        }

        /* ===== 页眉 ===== */
        .workshop-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .workshop-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 4rem;
            color: #f0dbb0;
            text-shadow:
                    4px 4px 0 #b48654,
                    8px 8px 0 #5a3e2a,
                    0 0 30px #ffaa33,
                    0 0 60px #ff5500;
            letter-spacing: 8px;
            margin-bottom: 10px;
            animation: titlePulse 4s infinite alternate;
        }

        @keyframes titlePulse {
            0% { text-shadow: 4px 4px 0 #b48654, 8px 8px 0 #5a3e2a, 0 0 30px #ffaa33, 0 0 60px #ff5500; }

            color: #dbb06c;

            background: #1a0f0aaa;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 50px;
            backdrop-filter: blur(3px);
            border: 2px solid #cfa86a;
            box-shadow: 0 6px 0 #4a3222;
        }

        .breadcrumb {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 10px;
            color: #b48654;
            font-size: 1.1rem;
        }

            color: #dbb06c;

            border-bottom: 1px dashed #b48654;
        }

        .breadcrumb a:hover {
            color: #ffcc66;
            border-bottom: 1px solid #ffaa33;
        }

        /* ===== 项目分类 ===== */
        .project-schools {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 40px;
        }

        .school-tag {
            font-family: 'MedievalSharp', cursive;
            padding: 10px 30px;
            background: #3a2a1a;
            color: #dbb06c;
            border: 2px solid #b48654;
            border-radius: 40px 5px 40px 5px;
            box-shadow: 4px 4px 0 #1a0f0a, 0 0 15px #ffaa3366;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .school-tag:hover,
        .school-tag.active {
            background: #5a3e2a;
            color: #fff2d7;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 6px 6px 0 #1a0f0a, 0 0 30px #ffaa33, 0 0 60px #ff8833;
            border-color: #ffdb9d;

        .school-tag.active::before {
            content: '⚡';
            margin-right: 8px;
        }

        /* ===== 项目网格 ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

            border-radius: 30px 5px 30px 5px;

            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #ffaa3322 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 12px 12px 0 #0a0a0a, 0 0 30px #ffaa33, 0 0 0 3px #ffdb9d inset;
            border-color: #ffdb9d;
        }

        .project-card:hover::before {
            opacity: 1;
            animation: portalSwirl 6s linear infinite;
        }

        @keyframes portalSwirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 项目头部（图标区域） */

            padding: 20px;
            border-bottom: 2px solid #b48654;
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a120a;
        }

            font-size: 2.5rem;
            background: #5a3e2a;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #b48654;
            box-shadow: 0 0 15px #ffaa33;
        }

        .project-name {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.6rem;
            color: #f0dbb0;
            margin: 0;
            flex: 1;
        }

        /* 项目内容 */
        .project-content {
            padding: 20px;
            flex: 1;
        }

        .project-description {
            color: #dbb06c;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 80px;
        }

        /* 项目元信息 */

            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px dashed #b48654;
            border-bottom: 1px dashed #b48654;
        }

        .project-language {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #dbb06c;
        }

        .language-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffaa33;
            box-shadow: 0 0 10px #ffaa33;
        }

        .project-stars {
            color: #b48654;
            font-family: 'Special Elite', cursive;
        }

        .project-stars::before {

            margin-right: 5px;
        }

        .project-forks::before {
            content: '🍴';

        }

        /* 技术标签 */
        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .tech-tag {
            background: #3a2a1a;
            color: #dbb06c;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            border: 1px solid #b48654;
            font-family: 'Special Elite', cursive;
        }

        /* 项目链接 */
        .project-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .project-link {
            flex: 1;
            padding: 10px;
            background: #5a3e2a;
            color: #f0dbb0;
            font-family: 'MedievalSharp', cursive;
            font-size: 1rem;
            border: 2px solid #b48654;
            border-radius: 30px 5px 30px 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .project-link:hover {
            background: #7a5a3a;
            border-color: #ffdb9d;
            box-shadow: 0 0 20px #ffaa33;
            transform: scale(1.02);
        }

        .project-link.github::before {

            margin-right: 5px;

            margin-right: 5px;

        /* 加载状态 */

            color: #dbb06c;

            padding: 60px;

            font-size: 1.3rem;

            font-size: 1.5rem;
            color: #dbb06c;

            }

                grid-template-columns: 1fr;
            }

            .project-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<script>
    // ===== 魔法粒子效果 =====
    (function initParticles() {
        const canvas = document.getElementById('magic-particles');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 4 + 1,
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: (Math.random() - 0.5) * 0.2,
                    color: `rgba(${200 + Math.random() * 55}, ${100 + Math.random() * 100}, 50, ${Math.random() * 0.3 + 0.2})`
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#ff8833';
                ctx.shadowBlur = 12;
                ctx.fill();

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > width) p.speedX *= -1;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    })();

    // ===== 渲染项目卡片 =====
    function renderProjects(category = 'all') {
        const grid = document.getElementById('projects-grid');

        // 筛选项目
        const filtered = category === 'all'
            ? projectsData
            : projectsData.filter(p => p.category === category);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-projects">📭 这个分类的神器还在锻造中...</div>';
            return;
        }

        // 生成 HTML
        let html = '';

        filtered.forEach(project => {
            // 处理语言颜色
            const languageColor = project.languageColor || '#ffaa33';

            // 处理标签
            const techTags = project.tech.map(t =>
                `<span class="tech-tag">${t}</span>`
            ).join('');

            html += `
                    <div class="project-card" data-category="${project.category}">
                        <div class="project-header">
                            <div class="project-icon">${project.icon}</div>
                            <h2 class="project-name">${project.name}</h2>
                        </div>

                                    <span class="language-dot" style="background: ${languageColor}; box-shadow: 0 0 10px ${languageColor};"></span>

                                </div>
                                <div class="project-stars">${project.stars}</div>
                                <div class="project-forks">${project.forks}</div>
                            </div>

                            </div>

                            <div class="project-links">
                                <a href="${project.githubUrl}" target="_blank" class="project-link github">GitHub</a>
                                ${project.demoUrl ?
                `<a href="${project.demoUrl}" target="_blank" class="project-link demo">试玩</a>` :
                `<span class="project-link" style="opacity:0.5; cursor:not-allowed;">暂无试玩</span>`
            }
                            </div>
                        </div>
                    </div>
                `;
        });

        // 模拟加载延迟
        setTimeout(() => {
            grid.innerHTML = html;
        }, 600);
    }

    // ===== 分类筛选 =====
    function setupFilters() {
        const filters = document.querySelectorAll('.school-tag');

        filters.forEach(filter => {
            filter.addEventListener('click', function() {
                // 更新激活状态
                filters.forEach(f => f.classList.remove('active'));
                this.classList.add('active');

                // 重新渲染项目
                const category = this.dataset.category;
                renderProjects(category);
            });
        });
    }

    // ===== 初始化 =====
    window.addEventListener('load', () => {
        setupFilters();
        renderProjects('all');
    });
</script>
