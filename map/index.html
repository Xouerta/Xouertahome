<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙骸大陆 · 传奇地图工坊</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #281f14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Palatino', 'Georgia', 'Times New Roman', serif;
            padding: 15px;
        }

        .map-wrapper {
            max-width: 1200px;
            width: 100%;
            background: #cfc6b0;
            background-image: radial-gradient(circle at 20% 30%, #e8dcc8 5%, #b1a07e 85%);
            border: 22px solid #6d5d3f;
            border-image: repeating-linear-gradient(45deg, #8f7f5a, #5f4f2e 18px) 30 stretch;
            box-shadow: 0 25px 40px rgba(0,0,0,0.8), inset 0 0 35px #ffeac2;
            border-radius: 150px 150px 100px 100px / 80px 80px 60px 60px;
            padding: 30px 25px 25px 25px;
            transition: all 0.2s;
        }

        .parchment {
            background: #f5e9d1;
            background-image:
                    linear-gradient(45deg, rgba(170, 140, 100, 0.15) 20%, transparent 20%),
                    linear-gradient(-45deg, rgba(150, 120, 80, 0.15) 20%, transparent 20%);
            background-size: 6px 6px;
            border-radius: 90px 90px 70px 70px / 50px 50px 40px 40px;
            padding: 30px 25px 25px 25px;
            box-shadow: inset 0 0 50px #b8a584, 0 8px 15px #2c2418;
            border: 2px solid #dabd91;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 5px double #6e5b3f;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-variant: small-caps;
            color: #32291e;
            letter-spacing: 2px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: normal;
            text-shadow: 3px 3px 0 #b69865, 5px 5px 0 #2f271c;
            margin: 0;
            line-height: 1;
        }

        .header .sub {
            font-size: 1.4rem;
            font-style: italic;
            color: #4d3c24;
            border-left: 3px solid #8f6f42;
            padding-left: 20px;
        }

        .map-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1.6 / 1;  /* 更宽广的视野 */
            background: #dac8a7;
            background: radial-gradient(circle at 35% 45%, #efdfc3, #b7a27c);
            border: 10px solid #a58b62;
            border-radius: 80px 80px 50px 50px / 40px 40px 30px 30px;
            box-shadow: inset 0 0 40px #927c52, 0 15px 25px #221e14;
            margin-bottom: 25px;
            overflow: hidden;
            image-rendering: crisp-edges;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: crosshair;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            background: #cabfaa;
            background: linear-gradient(145deg, #cbb896, #b6a27b);
            border: 5px ridge #9e895d;
            border-radius: 120px 40px 40px 120px;
            padding: 15px 25px;
            margin-top: 15px;
            box-shadow: 0 8px 12px #2f281a;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .medieval-btn {
            background: #5f5139;
            border: 4px solid #ead1a0;
            color: #fef2da;
            font-family: 'Palatino', 'Georgia', serif;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 50px 12px 50px 12px;
            box-shadow: 0 7px 0 #3f321f, 0 10px 12px black;
            cursor: pointer;
            transition: 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            text-shadow: 2px 3px 0 #332915;
        }

        .medieval-btn:hover {
            background: #776945;
            border-color: #faeac8;
            transform: translateY(3px);
            box-shadow: 0 4px 0 #3f321f, 0 8px 10px black;
        }

        .medieval-btn:active {
            transform: translateY(8px);
            box-shadow: 0 1px 0 #3f321f, 0 5px 8px black;
        }

        .legend {
            display: flex;
            gap: 30px;
            font-size: 1.2rem;
            color: #2b2419;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-icon {
            display: inline-block;
            width: 28px;
            height: 28px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 2px 2px #4f3f2b);
        }
        .icon-castle { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233b2e1f"><path d="M4 21h16v-4h-2v-4h-2v4h-2v-4h-2v4h-2v-4H8v4H6v-4H4v4H2v4h2zm2-10h12V7h-2v4h-2V7h-2v4h-2V7H8v4H6v4z"/><rect x="8" y="3" width="2" height="4"/><rect x="14" y="3" width="2" height="4"/></svg>'); }
        .icon-village { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233d5e3d"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-8-6z"/></svg>'); }
        .icon-woods { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%232b5a2b"><path d="M12 2L6 10h3l-3 6h4l-2 6h8l-2-6h4l-3-6h3z"/></svg>'); }
        .icon-hills { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23806751"><path d="M2 18l6-8 5 6 4-5 5 7H2z"/></svg>'); }
        .icon-mine { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%235a4d3a"><path d="M12 2L2 7v10l10 5 10-5V7l-10-5zm0 2.5L18.5 7 12 9.5 5.5 7 12 4.5zM4 16v-6.5l7 3.5v6.5l-7-3.5zm9 3.5v-6.5l7-3.5v6.5l-7 3.5z"/></svg>'); }
        .icon-monster { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23922b2b"><path d="M12 2C8 2 4 5 4 9v2c0 3 2 5 4 5v4c0 2 2 4 4 4s4-2 4-4v-4c2 0 4-2 4-5V9c0-4-4-7-8-7zM9 8c1 0 2 1 2 2s-1 2-2 2-2-1-2-2 1-2 2-2zm6 0c1 0 2 1 2 2s-1 2-2 2-2-1-2-2 1-2 2-2z"/></svg>'); }

        .seed-panel {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #382f21;
            padding: 6px 25px 6px 20px;
            border-radius: 60px;
            border: 2px solid #cbad77;
        }

        .seed-info {
            font-family: monospace;
            color: #f7deaa;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .realm-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffedc1;
            text-shadow: 2px 2px 0 #5d4329;
            background: #4e3d28;
            padding: 0 20px;
            border-radius: 40px;
            border: 1px solid #dcb785;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #4b402c;
            font-size: 1rem;
            font-style: italic;
            text-shadow: 0 1px 0 #dbcbb2;
        }
    </style>
</head>
<body>
<div class="map-wrapper">
    <div class="parchment">
        <div class="header">
            <h1>龙骸大陆</h1>
            <div class="sub">✦ 古名之地 ✦</div>
        </div>

        <div class="map-container">
            <canvas id="mapCanvas" width="1100" height="688"></canvas>
        </div>

        <div class="control-panel">
            <div class="btn-group">
                <button class="medieval-btn" id="newMapBtn">⟳ 新生纪元</button>
                <button class="medieval-btn" id="seedRandomBtn">🎲 命运之骰</button>
            </div>
            <div class="legend">
                <div class="legend-item"><span class="legend-icon icon-castle"></span> 城邦</div>
                <div class="legend-item"><span class="legend-icon icon-village"></span> 聚落</div>
                <div class="legend-item"><span class="legend-icon icon-woods"></span> 古森林</div>
                <div class="legend-item"><span class="legend-icon icon-hills"></span> 丘陵</div>
                <div class="legend-item"><span class="legend-icon icon-mine"></span> 矿脉</div>
                <div class="legend-item"><span class="legend-icon icon-monster"></span> 怪物巢穴</div>
            </div>
            <div class="seed-panel">
                <span class="realm-name" id="realmNameDisplay">艾尔德兰</span>
                <span class="seed-info" id="seedDisplay">种子: 2847</span>
            </div>
        </div>

        <footer>⚔ 每个纪元皆有不同的传说 · 矿藏与魔物静待英雄 ⚔</footer>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        // 更宽广的画布 (16:10比例)
        const CANVAS_WIDTH = 1100;
        const CANVAS_HEIGHT = 688;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        let currentSeed = 2847;      // 默认种子

        const seedDisplay = document.getElementById('seedDisplay');
        const realmNameDisplay = document.getElementById('realmNameDisplay');

        // 大陆名称词库
        const realmPrefix = ["艾尔", "多恩", "卡兹", "维拉", "萨尔", "布列", "冈达", "霍尔", "米斯", "奥拉", "伊瑟", "梵", "凯尔", "洛汗", "奈亚", "帕尔", "瑞文", "斯卡", "索瑟", "瓦尔"];
        const realmSuffix = ["兰", "尼亚", "西亚", "德", "公国", "王国", "高地", "荒原", "边境", "海岸", "谷地", "森林", "山脉", "沼泽", "领地", "行省", "大区", "荒野", "丘陵", "腹地"];

        // 城市名称库 (每个城堡/村庄都会获得一个独特名字)
        const cityPrefix = ["风", "石", "铁", "橡", "白", "黑", "红", "灰", "霜", "月", "星", "晨", "落", "暮", "鹰", "狼", "鹿", "熊", "鸦", "龙", "狮", "玫瑰", "冬", "夏", "春", "秋", "橡木", "松木", "铜", "银", "金", "水晶", "迷雾", "溪流", "河谷", "峭壁", "孤山", "幽暗", "亮水", "铁砧"];
        const citySuffix = ["堡", "城", "港", "镇", "村", "屯", "庄", "桥", "要塞", "岗哨", "浅滩", "原野", "林地", "矿场", "庄园", "营地", "壁垒", "哨站", "庇护所", "窝"];

        // 怪物巢穴描述
        const monsterTypes = ["巨龙", "食人魔", "巨魔", "蝎尾狮", "双足飞龙", "狼人", "吸血鬼", "石化鸡蛇", "奇美拉", "狮鹫", "蛇发女妖", "黑暗精灵", "兽人部落", "哥布林大军", "蜘蛛女王", "不死军团", "元素巨像", "鹰身女妖", "洞穴巨人", "恐狼"];

        // 矿藏类型
        const mineTypes = ["金矿", "银矿", "铜矿", "铁矿", "秘银矿", "水晶矿", "宝石矿", "煤矿", "锡矿", "硫磺矿", "魔法石矿", "黑曜石矿"];

        // 随机数生成器
        function mulberry32(seed) {
            return function() {
                seed |= 0;
                seed = (seed + 0x6d2b79f5) | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        let rng = mulberry32(currentSeed);

        function setSeed(newSeed) {
            currentSeed = newSeed;
            rng = mulberry32(currentSeed);
            seedDisplay.innerText = `种子: ${currentSeed}`;
            generateRealmName();
        }

        // 生成大陆名称
        function generateRealmName() {
            let name = randomPick(realmPrefix) + randomPick(realmSuffix);
            realmNameDisplay.innerText = name;
        }

        function randInt(min, max) {
            return Math.floor(rng() * (max - min + 1)) + min;
        }

        function randomPick(arr) {
            return arr[Math.floor(rng() * arr.length)];
        }

        // 生成一个独特的城市名称
        function generateCityName() {
            return randomPick(cityPrefix) + randomPick(citySuffix);
        }

        // 数据结构存储所有地点（用于将来扩展）
        let locations = [];

        // ---------- 绘图函数 (增强细致度) ----------
        function drawMountain(x, y, size, name = "") {
            ctx.save();
            ctx.translate(x, y);
            // 主峰
            ctx.beginPath();
            ctx.moveTo(0, -size * 1.3);
            ctx.lineTo(-size * 0.8, size * 0.5);
            ctx.lineTo(size * 0.8, size * 0.5);
            ctx.closePath();
            ctx.fillStyle = '#6b5a48';
            ctx.shadowColor = '#3a3227';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
            // 雪顶
            ctx.beginPath();
            ctx.moveTo(0, -size * 1.3);
            ctx.lineTo(-size * 0.3, -size * 0.2);
            ctx.lineTo(size * 0.3, -size * 0.2);
            ctx.closePath();
            ctx.fillStyle = '#ede7d5';
            ctx.fill();
            // 山脊线
            ctx.strokeStyle = '#443d31';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-size * 0.6, 0.1 * size);
            ctx.lineTo(0, -size * 0.7);
            ctx.lineTo(size * 0.6, 0.1 * size);
            ctx.stroke();

            // 如果名字存在，绘制小标签（山名）
            if (name) {
                ctx.font = 'italic 11px "Palatino", "Georgia", serif';
                ctx.fillStyle = '#2f281b';
                ctx.shadowBlur = 3;
                ctx.shadowColor = '#ebdbba';
                ctx.fillText(name, -25, -size*0.7);
                ctx.shadowBlur = 0;
            }
            ctx.restore();
        }

        function drawHill(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.beginPath();
            ctx.ellipse(0, size*0.2, size*0.9, size*0.45, 0, 0, Math.PI*2);
            ctx.fillStyle = '#7f6e50';
            ctx.shadowBlur = 7;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#5b4d37';
            ctx.lineWidth = 1.3;
            ctx.stroke();
            // 细致纹理 (短草)
            ctx.strokeStyle = '#5d7d49';
            ctx.lineWidth = 1.2;
            for (let i = -3; i <= 3; i++) {
                let offsetX = i * size * 0.25;
                ctx.beginPath();
                ctx.moveTo(offsetX, size*0.1);
                ctx.lineTo(offsetX - 5, size*0.6);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawForest(x, y, size, dense = true) {
            ctx.save();
            ctx.translate(x, y);
            let treeCount = dense ? 5 : 3;
            for (let i = 0; i < treeCount; i++) {
                let treeX = (i - (treeCount-1)/2) * size * 0.5;
                let treeY = -size * 0.1 + i * 2;
                // 树冠
                ctx.beginPath();
                ctx.moveTo(treeX, treeY);
                ctx.lineTo(treeX - size*0.3, treeY + size*0.6);
                ctx.lineTo(treeX + size*0.3, treeY + size*0.6);
                ctx.closePath();
                ctx.fillStyle = '#3f6b3a';
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.fillStyle = '#5b8c4f';
                ctx.beginPath();
                ctx.arc(treeX, treeY - size*0.15, size*0.22, 0, 2*Math.PI);
                ctx.fill();
                // 树干
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#735e46';
                ctx.fillRect(treeX-4, treeY+ size*0.25, 7, size*0.3);
            }
            ctx.restore();
        }

        // 细致城堡 (带名字标签)
        function drawCastle(x, y, size, name) {
            ctx.save();
            ctx.translate(x, y);
            // 主楼
            ctx.fillStyle = '#6f5e47';
            ctx.shadowBlur = 9;
            ctx.fillRect(-size*0.45, -size*0.25, size*0.9, size*0.7);
            // 塔楼
            ctx.fillRect(-size*0.7, -size*0.4, size*0.35, size*0.85);
            ctx.fillRect(size*0.35, -size*0.4, size*0.35, size*0.85);
            // 雉堞
            ctx.fillStyle = '#90805e';
            for (let i = -3; i <= 3; i++) {
                let cx = i * size*0.2;
                if (cx > -size*0.5 && cx < size*0.5) {
                    ctx.fillRect(cx-5, -size*0.35, 9, 14);
                }
            }
            // 旗帜
            ctx.fillStyle = '#ab2323';
            ctx.beginPath();
            ctx.moveTo(size*0.55, -size*0.6);
            ctx.lineTo(size*0.9, -size*0.55);
            ctx.lineTo(size*0.55, -size*0.35);
            ctx.closePath();
            ctx.fill();

            // 名字标签
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#fef5dd';
            ctx.font = 'bold 14px "Palatino", "Georgia", serif';
            ctx.fillStyle = '#2f281a';
            ctx.fillText(name, -30, -size*0.8);
            ctx.restore();
        }

        function drawVillage(x, y, size, name) {
            ctx.save();
            ctx.translate(x, y);
            // 几间小屋
            for (let i = -1; i <= 1; i++) {
                let offsetX = i * size * 0.6;
                ctx.fillStyle = '#ac8f68';
                ctx.fillRect(offsetX-10, -size*0.1, 16, 16);
                ctx.fillStyle = '#c94f2b';
                ctx.beginPath();
                ctx.moveTo(offsetX-12, -size*0.1);
                ctx.lineTo(offsetX+8, -size*0.1);
                ctx.lineTo(offsetX-2, -size*0.32);
                ctx.closePath();
                ctx.fillStyle = '#8b3c1e';
                ctx.fill();
            }
            ctx.font = 'italic 12px "Palatino"';
            ctx.fillStyle = '#2f3e1f';
            ctx.shadowBlur = 3;
            ctx.shadowColor = '#efe3c9';
            ctx.fillText(name, -20, -25);
            ctx.restore();
        }

        // 矿藏图标
        function drawMine(x, y, size, mineType) {
            ctx.save();
            ctx.translate(x, y);
            // 矿车/矿洞
            ctx.fillStyle = '#4f4231';
            ctx.beginPath();
            ctx.ellipse(0, 0, size*0.5, size*0.25, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#6d5c45';
            ctx.fillRect(-size*0.2, -size*0.3, size*0.4, size*0.3);
            ctx.fillStyle = '#00000033';
            ctx.beginPath();
            ctx.arc(0, -size*0.2, size*0.15, 0, 2*Math.PI);
            ctx.fillStyle = '#2b2b2b';
            ctx.fill();
            // 十字镐标记
            ctx.strokeStyle = '#b39b70';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-size*0.1, -size*0.1);
            ctx.lineTo(size*0.1, size*0.1);
            ctx.moveTo(size*0.1, -size*0.1);
            ctx.lineTo(-size*0.1, size*0.1);
            ctx.stroke();
            ctx.font = '10px "Palatino"';
            ctx.fillStyle = '#2b2b2b';
            ctx.fillText(mineType, -25, -35);
            ctx.restore();
        }

        // 怪物巢穴
        function drawMonsterLair(x, y, size, monsterName) {
            ctx.save();
            ctx.translate(x, y);
            // 骨头/洞穴
            ctx.fillStyle = '#4e3e31';
            ctx.beginPath();
            ctx.ellipse(0, 0, size*0.6, size*0.35, 0, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#26221a';
            ctx.beginPath();
            ctx.ellipse(-5, -5, size*0.25, size*0.15, 0, 0, 2*Math.PI);
            ctx.fill();
            // 眼睛
            ctx.fillStyle = '#d12424';
            ctx.beginPath();
            ctx.arc(5, -8, 4, 0, 2*Math.PI);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(3, -10, 1.5, 0, 2*Math.PI);
            ctx.fill();

            ctx.font = 'bold 12px "Palatino"';
            ctx.fillStyle = '#3d1f1f';
            ctx.fillText(monsterName, -35, -40);
            ctx.restore();
        }

        // 河流 (更细致)
        function drawRiver(startX, startY, endX, endY) {
            ctx.save();
            ctx.strokeStyle = '#3e6d8c';
            ctx.lineWidth = 6;
            ctx.globalAlpha = 0.65;
            ctx.shadowColor = '#2f5575';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            let cp1x = startX + (endX - startX) * 0.3 + (rng() - 0.5) * 90;
            let cp1y = startY + (endY - startY) * 0.2 + (rng() - 0.5) * 45;
            let cp2x = startX + (endX - startX) * 0.7 + (rng() - 0.5) * 90;
            let cp2y = startY + (endY - startY) * 0.8 + (rng() - 0.5) * 45;
            ctx.moveTo(startX, startY);
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
            ctx.stroke();
            ctx.restore();
        }

        // 背景纹理
        function drawParchmentTexture() {
            ctx.fillStyle = '#e5d5b8';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.globalAlpha = 0.2;
            for (let i = 0; i < 400; i++) {
                ctx.fillStyle = rng() > 0.6 ? '#9e8d73' : '#4e3f2b';
                ctx.beginPath();
                ctx.arc(randInt(0, CANVAS_WIDTH), randInt(0, CANVAS_HEIGHT), randInt(1, 5), 0, 2*Math.PI);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            ctx.strokeStyle = '#a0845c';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([12, 8]);
            ctx.strokeRect(15, 15, CANVAS_WIDTH-30, CANVAS_HEIGHT-30);
            ctx.setLineDash([]);
        }

        // 主生成器
        function generateMap() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawParchmentTexture();
            locations = [];

            // 1. 河流 (2~3条)
            let riverCount = randInt(2, 4);
            for (let r = 0; r < riverCount; r++) {
                let startX = randInt(30, 250);
                let startY = randInt(20, 200);
                let endX = randInt(CANVAS_WIDTH-250, CANVAS_WIDTH-50);
                let endY = randInt(CANVAS_HEIGHT-150, CANVAS_HEIGHT-40);
                drawRiver(startX, startY, endX, endY);
            }

            // 2. 山脉 (4~7座主要山脉，带名字)
            let mountains = randInt(5, 8);
            for (let m = 0; m < mountains; m++) {
                let x = randInt(100, CANVAS_WIDTH-150);
                let y = randInt(80, CANVAS_HEIGHT-150);
                let size = randInt(45, 75);
                let mountainName = randomPick(["霜", "灰", "红", "龙骨", "巨人", "迷雾", "铁", "银", "刃"]) + "峰";
                drawMountain(x, y, size, mountainName);
                // 附属小山峰
                for (let s = 0; s < 2; s++) {
                    drawMountain(x + randInt(-50, 50), y + randInt(10, 50), size * 0.55, "");
                }
            }

            // 3. 丘陵 (8~14个)
            let hills = randInt(9, 15);
            for (let h = 0; h < hills; h++) {
                let x = randInt(40, CANVAS_WIDTH-40);
                let y = randInt(40, CANVAS_HEIGHT-40);
                let size = randInt(25, 45);
                drawHill(x, y, size);
            }

            // 4. 森林 (12~20片，更密集)
            let forests = randInt(14, 22);
            for (let f = 0; f < forests; f++) {
                let x = randInt(30, CANVAS_WIDTH-30);
                let y = randInt(30, CANVAS_HEIGHT-30);
                let size = randInt(22, 40);
                let dense = rng() > 0.3;
                drawForest(x, y, size, dense);
                if (rng() > 0.6) { // 森林群落
                    drawForest(x+25, y-15, size*0.7, dense);
                }
            }

            // 5. 城堡 (主要城邦 3~5个，带名字)
            let castles = randInt(3, 6);
            for (let c = 0; c < castles; c++) {
                let x = randInt(120, CANVAS_WIDTH-150);
                let y = randInt(80, CANVAS_HEIGHT-150);
                let name = generateCityName();
                drawCastle(x, y, 45 + randInt(0, 15), name);
                // 每个城堡周围配小村庄
                for (let v = 0; v < randInt(1, 3); v++) {
                    let vx = x + randInt(-70, 70);
                    let vy = y + randInt(-40, 60);
                    if (vx > 30 && vx < CANVAS_WIDTH-30 && vy > 30 && vy < CANVAS_HEIGHT-30) {
                        let villageName = generateCityName();
                        drawVillage(vx, vy, 12, villageName);
                    }
                }
            }

            // 6. 独立村庄 (6~12个)
            let villages = randInt(8, 15);
            for (let v = 0; v < villages; v++) {
                let x = randInt(40, CANVAS_WIDTH-40);
                let y = randInt(40, CANVAS_HEIGHT-40);
                let name = generateCityName();
                drawVillage(x, y, 14, name);
            }

            // 7. 矿藏 (4~8个)
            let mines = randInt(5, 9);
            for (let m = 0; m < mines; m++) {
                let x = randInt(50, CANVAS_WIDTH-50);
                let y = randInt(50, CANVAS_HEIGHT-50);
                let mineType = randomPick(mineTypes);
                drawMine(x, y, 22, mineType);
            }

            // 8. 怪物巢穴 (3~7个)
            let lairs = randInt(4, 8);
            for (let l = 0; l < lairs; l++) {
                let x = randInt(50, CANVAS_WIDTH-50);
                let y = randInt(50, CANVAS_HEIGHT-50);
                let monster = randomPick(monsterTypes) + "巢穴";
                drawMonsterLair(x, y, 22, monster);
            }

            // 9. 最后添加一些古道/连接线 (氛围)
            ctx.save();
            ctx.strokeStyle = '#9a875d';
            ctx.lineWidth = 1.8;
            ctx.setLineDash([12, 8]);
            for (let p = 0; p < 4; p++) {
                let x1 = randInt(20, 300);
                let y1 = randInt(20, 300);
                let x2 = randInt(600, 1000);
                let y2 = randInt(400, 600);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.restore();
        }

        // 刷新地图并更新名字
        function refreshMap() {
            generateMap();
        }

        function randomSeed() {
            const newSeed = Math.floor(rng() * 100000) + 1; // 用旧种子取随机，但更好直接用 Math
            setSeed(newSeed);
            refreshMap();
        }

        // 初始化
        setSeed(currentSeed);
        refreshMap();

        // 绑定按钮
        document.getElementById('newMapBtn').addEventListener('click', () => {
            setSeed(currentSeed + 1);
            refreshMap();
        });

        document.getElementById('seedRandomBtn').addEventListener('click', () => {
            // 使用当前时间混合，确保真随机
            let newSeed = Math.floor(Math.random() * 100000) + 1;
            setSeed(newSeed);
            refreshMap();
        });

        canvas.addEventListener('click', () => {
            setSeed(currentSeed + 17);
            refreshMap();
        });
    })();
</script>
</body>
</html>
